databases:
  - name: tiqmo-kyc-db
    plan: free
    databaseName: tiqmo_kyc
    user: tiqmo_kyc_user

services:
  - type: web
    name: tiqmo-kyc-review-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: tiqmo-kyc-db
          property: connectionString
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: KYC_REFERENCE_DATE
        value: 2026-06-18
      - key: CORS_ORIGINS
        value: http://localhost:5173
      - key: GROQ_API_KEY
        sync: false
